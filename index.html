<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FundedNext Web Calculator</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="app-container">

  <!-- TOP TABS (STATIC FOR NOW) -->
  <div class="tabs">
    <button class="tab active">Margin Calculator</button>
    <button class="tab">Profit/Loss Calculator</button>
    <button class="tab">Lot Size Calculator</button>
    <button class="tab">Swap Calculator</button>
  </div>

  <!-- MAIN CARD -->
  <div class="card">

    <!-- LEFT SIDE -->
    <div class="form-section">

      <div class="form-group">
        <label>Market</label>
        <select id="market"></select>
      </div>

      <div class="form-group">
        <label>Instrument</label>
        <select id="instrument"></select>
      </div>

      <div class="form-group">
        <label>Model</label>
        <select id="model"></select>
      </div>

      <div class="form-group">
        <label>Current Price</label>
        <input type="number" id="price" placeholder="Enter price">
      </div>

      <div class="form-group">
        <label>Lot Size</label>
        <input type="number" id="lotSize" placeholder="Enter size">
      </div>

      <div class="form-group checkbox-group">
        <input type="checkbox" id="useManualLeverage">
        <label>Use manual leverage</label>
      </div>

      <div id="manualLeverageWrap" class="form-group">
        <label>Manual Leverage</label>
        <input type="number" id="manualLeverage" placeholder="Enter leverage">
      </div>

    </div>

    <!-- RIGHT SIDE -->
    <div class="result-section">
      <p>Result</p>
      <h2 id="result">0.00</h2>
    </div>

  </div>

  <!-- INFO -->
  <div class="info">
    <p>Contract Size: <span id="contractSize">-</span></p>
    <p>Conversion Factor: <span id="conversionFactor">-</span></p>
    <p>Leverage Used: <span id="leverageUsed">-</span></p>
  </div>

</div>

<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
