<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FundedNext Web Calculator</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="app-container">

  <div class="tabs">
    <button class="tab active">Margin Calculator</button>
    <button class="tab">Profit & Add Pip Calculator</button>
    <button class="tab">Max Lot Calculator</button>
    <button class="tab">Risk Tools</button>
  </div>

  <div class="card">

    <div class="form-section">

      <div class="form-group">
        <label>Market</label>
        <select id="market">
          <option value="">Select market</option>
          <option value="Currency">Currency</option>
          <option value="Commodity">Commodity</option>
          <option value="Indice">Indice</option>
          <option value="Crypto">Crypto</option>
        </select>
      </div>

      <div class="form-group">
        <label>Instrument</label>
        <select id="instrument">
          <option value="">Select instrument</option>
        </select>
      </div>

      <div class="form-group" id="modelGroup">
        <label>Model</label>
        <select id="model">
          <option value="">Select model</option>
        </select>
      </div>

      <div class="form-group">
        <label>Current Price</label>
        <input id="price" type="number" placeholder="Enter price">
      </div>

      <div class="form-group">
        <label>Lot Size</label>
        <input id="lotSize" type="number" placeholder="Enter size">
      </div>

      <div class="toggle-group">
        <label class="switch">
          <input type="checkbox" id="useManualLeverage">
          <span class="slider"></span>
        </label>
        <span>Use manual leverage</span>
      </div>

      <div id="manualLeverageWrap" class="form-group">
        <label>Manual Leverage</label>
        <input id="manualLeverage" type="number" placeholder="Enter leverage">
      </div>

    </div>

    <div class="result-section">
      <p>Result</p>
      <h2 id="result">0.00</h2>
      <div id="resultCurrency" style="margin-top: 8px; font-size: 14px; font-weight: 600; letter-spacing: 0.5px; opacity: 0.9;">USD</div>
    </div>

  </div>

  <div class="info">
    <p>Contract Size: <span id="contractSize">-</span></p>
    <p>Conversion Factor: <span id="conversionFactor">-</span></p>
    <p>Leverage Used: <span id="leverageUsed">-</span></p>
  </div>

  <div id="helperBox" class="helper-box">
    Select a market to begin.
  </div>

</div>

<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
