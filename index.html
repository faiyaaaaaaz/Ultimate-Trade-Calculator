<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FundedNext Web Calculator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1>FundedNext Web Calculator</h1>
  <p>Version 1 test build — Margin Calculator</p>

  <div class="card">

    <h2>Margin Calculator</h2>

    <!-- MARKET -->
    <label>Market</label>
    <select id="market">
      <option value="">Select market</option>
      <option value="Currency">Currency</option>
      <option value="Commodity">Commodity</option>
      <option value="Indice">Indice</option>
      <option value="Crypto">Crypto</option>
    </select>

    <!-- INSTRUMENT -->
    <label>Instrument</label>
    <select id="instrument">
      <option value="">Select instrument</option>
    </select>

    <!-- MODEL -->
    <label>Model</label>
    <select id="model">
      <option value="">Select model</option>
    </select>

    <!-- PRICE -->
    <label>Current Price</label>
    <input type="number" id="price" placeholder="Enter current price">

    <!-- LOT SIZE -->
    <label>Lot Size</label>
    <input type="number" id="lotSize" placeholder="Enter lot size">

    <!-- MANUAL LEVERAGE -->
    <div style="margin-top:10px;">
      <input type="checkbox" id="useManualLeverage">
      <label for="useManualLeverage">Use manual leverage</label>
    </div>

    <div id="manualLeverageWrap" style="display:none;">
      <label>Manual Leverage</label>
      <input type="number" id="manualLeverage" placeholder="Enter leverage">
    </div>

    <!-- RESULT -->
    <div class="result-box">
      <p>Required Margin (USD)</p>
      <h2 id="result">0.00</h2>
    </div>

    <!-- INFO -->
    <div class="info-box">
      <p>Contract Size: <span id="contractSize">-</span></p>
      <p>Conversion Factor: <span id="conversionFactor">-</span></p>
      <p>Leverage Used: <span id="leverageUsed">-</span></p>
    </div>

    <!-- HELPER -->
    <div id="helperBox" style="margin-top:10px;">
      Select a market to begin.
    </div>

  </div>

  <!-- IMPORTANT: ORDER MATTERS -->
  <script src="data.js"></script>
  <script src="app.js"></script>

</body>
</html>
