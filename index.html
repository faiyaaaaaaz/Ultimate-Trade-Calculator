<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FundedNext Web Calculator</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="app-container">

  <!-- TOP TABS -->
  <div class="tabs">
    <button class="tab active">Margin Calculator</button>
    <button class="tab">Profit & Add Pip Calculator</button>
    <button class="tab">Max Lot Calculator</button>
    <button class="tab">Risk Tools</button>
  </div>

  <!-- MAIN CARD -->
  <div class="card">

    <!-- LEFT -->
    <div class="form-section">

      <div class="form-group">
        <label>Market</label>
        <select id="market">
          <option value="">Select market</option>
          <option value="Currency">Currency</option>
          <option value="Commodity">Commodity</option>
          <option value="Indice">Indice</option>
          <option value="Crypto">Crypto</option>
        </select>
      </div>

      <div class="form-group">
        <label>Instrument</label>
        <select id="instrument">
          <option>Select instrument</option>
        </select>
      </div>

      <div class="form-group">
        <label>Model</label>
        <select id="model">
          <option>Select model</option>
        </select>
      </div>

      <div class="form-group">
        <label>Current Price</label>
        <input type="number" id="price" placeholder="Enter price">
      </div>

      <div class="form-group">
        <label>Lot Size</label>
        <input type="number" id="lotSize" placeholder="Enter size">
      </div>

      <div class="form-group checkbox-group">
        <input type="checkbox" id="useManualLeverage">
        <label>Use manual leverage</label>
      </div>

      <div id="manualLeverageWrap" class="form-group">
        <label>Manual Leverage</label>
        <input type="number" id="manualLeverage" placeholder="Enter leverage">
      </div>

    </div>

    <!-- RIGHT -->
    <div class="result-section">
      <p>Result</p>
      <h2 id="result">0.00</h2>
    </div>

  </div>

  <!-- INFO -->
  <div class="info">
    <p>Contract Size: <span id="contractSize">-</span></p>
    <p>Conversion Factor: <span id="conversionFactor">-</span></p>
    <p>Leverage Used: <span id="leverageUsed">-</span></p>
  </div>

</div>

<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
